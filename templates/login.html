<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .login-container {
            width: 300px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .error {
            color: red;
            margin-top: 10px;
            font-size: 0.9em;
        }
        .recovery-link {
            margin-top: 10px;
            display: block;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>
        <form action="#" method="post" aria-label="Login form">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required aria-label="Enter your username">
            <div class="error" id="username-error" aria-live="polite"></div>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required aria-label="Enter your password">
            <div class="error" id="password-error" aria-live="polite"></div>

            <button type="submit">Login</button>
            <div class="recovery-link"><a href="#">Forgot your password?</a></div>
        </form>
    </div>
</body>
</html>
